<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parallax 2.5D — Hero</title>
  <meta name="description" content="Hero one-page avec effet de scroll parallax 2.5D (GSAP ScrollTrigger)." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ============================================================
       HERO : section pinnée (100vh) pendant ~150vh de scroll.
       Empilement (z-index) :
         sky          → z-index 1  (fond, derrière)
         product-panel → z-index 2  (au milieu, masqué par la colline en bas)
         mountain     → z-index 3  (premier plan, devant)
         title        → z-index 4  (texte toujours lisible)
       ============================================================ -->
  <!-- .scene = piste de scroll ; .hero reste "sticky" pendant l'animation,
       puis le document s'arrête net (aucun espace blanc après). -->
  <div class="scene">
    <section class="hero" id="hero">
      <div class="hero__stage">

      <!-- CALQUE 1 : ciel (fond fixe / très lent) -->
      <img class="layer layer--sky" src="assets/img/sky.png" alt="" aria-hidden="true" />

      <!-- CALQUE 2 : DOCK liquid-glass (recréation de la carte Umbra) -->
      <!-- garde l'id #product-panel : c'est lui qui émerge de derrière la colline -->
      <div id="product-panel" class="glass-dock" role="group" aria-label="Umbra">

        <!-- Onglets -->
        <div class="dock-tabs">
          <button type="button" class="dock-tab is-active">Shield</button>
          <button type="button" class="dock-tab">Private Swap</button>
          <button type="button" class="dock-tab">Private Send</button>
          <button type="button" class="dock-tab">Withdraw</button>
          <button type="button" class="dock-tab">Bridge</button>
        </div>

        <!-- Carte "You're Shielding" -->
        <div class="dock-card">
          <span class="dock-card__label">You're Shielding</span>
          <div class="dock-card__amount-row">
            <span class="dock-card__amount">0</span>
            <button type="button" class="token-select">
              Select Token
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M8 10l4 4 4-4" stroke="currentColor" stroke-width="1.8"
                      stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
          </div>
          <div class="dock-card__meta">
            <span class="left">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M15 19V6.66c0-1 0-1.51.31-1.63.31-.13.67.23 1.4.94L19 8.21"
                      stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M9 5v12.34c0 1.01 0 1.51-.31 1.64-.31.12-.67-.24-1.4-.95L5 15.79"
                      stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              0.00
            </span>
            <span class="right">Balance: 24,983.21<span class="dock-dot"></span>Max</span>
          </div>
        </div>

        <!-- Frais -->
        <div class="dock-fee">
          <span>Shielding Fee</span>
          <span>No Fee<span class="dock-dot"></span>$0.00</span>
        </div>

        <!-- CTA -->
        <button type="button" class="dock-cta">Get Started</button>
      </div>

      <!-- CALQUE 3 : colline premier plan (PNG transparent qui masque le dock) -->
      <img class="layer layer--mountain" src="assets/img/mountain.png" alt="" aria-hidden="true" />

      <!-- CALQUE 4 : titre du hero (façon Umbra) -->
      <div class="hero__title">
        <h1>Incognito mode<br>for your money.</h1>
        <p>Umbra is the privacy layer for money. Shield assets with zero fees.</p>
      </div>

      </div>
    </section>
  </div>

  <!-- GSAP 3 + ScrollTrigger via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
